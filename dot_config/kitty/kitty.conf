include rose-pine-moon.conf

# BEGIN_KITTY_THEME
# Rosé Pine Moon
include current-theme.conf
# END_KITTY_THEME

#########################
######### FONTS #########
#########################
font_family      Hack Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 11.0


#########################
###### KEYBINDINGS ######
#########################
kitty_mod alt
map kitty_mod+q close_tab
map kitty_mod+t new_tab
map kitty_mod+e launch --cwd=current --type=os-window yazi


#########################
######## CONFIG #########
#########################
confirm_os_window_close 0